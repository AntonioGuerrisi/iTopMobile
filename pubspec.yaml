name: itop_mobile
description: App mobile per la gestione dei ticket e asset di iTop.
publish_to: 'none'
version: 0.1.7+7

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  intl: ^0.19.0
  flutter_secure_storage: ^9.2.3
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  pull_to_refresh_flutter3: ^2.0.2
  flutter_slidable: ^3.1.1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
